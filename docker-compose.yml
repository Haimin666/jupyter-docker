services:
  jupyter:
    build: .
    image: jupyter-py39:latest
    container_name: jupyter
    restart: unless-stopped
    # host 网络：Spark YARN client 模式下集群 executor 要回连容器里的 driver，
    # bridge 网络不可达。用 host 网络让容器共享宿主机网络（集群能解析到宿主机主机名）。
    # 代价：jupyter 直接监听宿主机 0.0.0.0:8888，务必用防火墙或反代限制访问。
    network_mode: host
    volumes:
      # notebook 持久化
      - ./notebooks:/home/jovyan/work
      # 集群配置（YARN 提交用）：把集群的 core-site/hdfs-site/yarn-site/hive-site.xml 放进对应目录
      - ./hadoop-conf:/etc/hadoop/conf:ro
      - ./hive-conf:/etc/hive/conf:ro
      # 连接器 jar（paimon/mysql 等）：放进 ./lib，容器内为 /opt/lib，spark.jars / flink -C 引用
      # 挂到 /opt/lib 而非 /opt：镜像内 /opt 下已有 jdk8、venv，直接挂 /opt 会覆盖掉它们
      - ./lib:/opt/lib:ro
    environment:
      - TZ=Asia/Shanghai
      # token 从 .env 注入，避免明文入仓
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:?请在 .env 中设置 JUPYTER_TOKEN}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # jupyter-server 2 的 /api/status 需要认证，带 token 才返回 200
      test: ["CMD", "python", "-c", "import os,urllib.request,sys; r=urllib.request.urlopen('http://localhost:8888/api/status?token='+os.environ['JUPYTER_TOKEN']); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
